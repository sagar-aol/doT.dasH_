<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="doT.dasH_ - A seamless, accessible Morse code translator.">
    <title>doT.dasH_</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-animation" class="bg-animation" aria-hidden="true"></div>

    <header class="app-header">
        <h1 class="logo" aria-label="Dot Dash">
            <span class="grad-text">doT</span><span class="dot-anim">.</span>
            <span class="gap-space"></span>
            <span class="grad-text">dasH</span><span class="dash-anim">_</span>
        </h1>
        <button id="btn-settings" aria-label="Open Settings" aria-haspopup="dialog" class="icon-btn focus-ring">
            <span class="material-symbols-rounded">settings</span>
        </button>
    </header>

    <main class="app-container">
        <section class="unified-view">

            <div class="output-wrapper">
                <div class="output-display large-display focus-ring" id="main-output" aria-live="polite" tabindex="0">
                    <span class="placeholder">Awaiting input...</span>
                </div>

                <div class="display-controls">
                    <button id="btn-keyboard-toggle" class="corner-btn focus-ring" aria-label="Toggle Keyboard Input" aria-pressed="false">
                        <span class="material-symbols-rounded">keyboard</span>
                    </button>
                    <button id="btn-camera" class="corner-btn focus-ring" aria-label="Scan Text with Camera" aria-haspopup="dialog">
                        <span class="material-symbols-rounded">photo_camera</span>
                    </button>
                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" aria-hidden="true">
                </div>
            </div>

            <div class="display-current-morse" id="current-morse-buffer" aria-live="assertive"></div>

            <div id="dynamic-input-container">

                <div class="calculator-grid" id="calc-grid">
                    <button class="calc-btn primary-input-btn focus-ring" id="btn-dot" aria-label="Input Dot">
                        <span class="material-symbols-rounded grad-text dot-anim">circle</span>
                    </button>
                    <button class="calc-btn primary-input-btn focus-ring" id="btn-dash" aria-label="Input Dash">
                        <span class="material-symbols-rounded grad-text dash-anim">horizontal_rule</span>
                    </button>

                    <button class="calc-btn secondary-btn focus-ring" id="btn-space" aria-label="Input Space">
                        <span class="material-symbols-rounded">space_bar</span>
                    </button>
                    <button class="calc-btn secondary-btn focus-ring" id="btn-del" aria-label="Delete last input">
                        <span class="material-symbols-rounded">backspace</span>
                    </button>
                    <button class="calc-btn danger-btn focus-ring" id="btn-reset" aria-label="Reset all inputs">
                        <span class="material-symbols-rounded">restart_alt</span>
                    </button>
                    <button class="calc-btn action-btn focus-ring" id="btn-send" aria-label="Confirm translation">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>

                <div class="keyboard-input-group" id="keyboard-grid" style="display: none; opacity: 0;">
                    <label for="text-input" class="visually-hidden">Type text to translate</label>
                    <textarea id="text-input" class="focus-ring" placeholder="Type text to translate..."></textarea>
                </div>
            </div>

        </section>
    </main>

    <button id="btn-guide" aria-label="Open Morse Translation Guide" aria-haspopup="dialog" class="floating-action-btn focus-ring">
        <span class="material-symbols-rounded">help</span>
    </button>

    <footer class="tiny-disclaimer">
        Made with <span style="color: #ff4757; font-size: 0.8rem;" aria-hidden="true">❤️</span> by <a href="https://github.com/sagar-aol" target="_blank" rel="noopener noreferrer" class="focus-ring">https://github.com/sagar-aol</a>
    </footer>

    <div id="guide-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="guide-title">
        <div class="modal-content large-modal">
            <div class="modal-header">
                <h2 id="guide-title">Translation Guide</h2>
                <button id="btn-close-guide" class="icon-btn focus-ring" aria-label="Close Guide"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; text-align: center;">Tap any symbol to copy</p>
                <h3 class="guide-section-title">Alphabets</h3><div class="guide-grid" id="guide-grid-letters"></div>
                <h3 class="guide-section-title">Numbers</h3><div class="guide-grid" id="guide-grid-numbers"></div>
                <h3 class="guide-section-title">Symbols</h3><div class="guide-grid" id="guide-grid-symbols"></div>
            </div>
        </div>
    </div>

    <div id="crop-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="crop-title">
        <div class="modal-content crop-modal-content">
            <div class="modal-header">
                <h2 id="crop-title">Crop Text</h2>
                <button id="btn-close-crop" class="icon-btn focus-ring" aria-label="Close Crop Window"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="crop-container"><img id="crop-image" src="" alt="Image to crop"></div>
            <button id="btn-run-ocr" class="calc-btn action-btn focus-ring" style="width:100%; margin-top:1rem;">
                <span class="material-symbols-rounded">document_scanner</span> Translate
            </button>
        </div>
    </div>

    <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="settings-title">Settings</h2>
                <button id="btn-close-settings" class="icon-btn focus-ring" aria-label="Close Settings"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <label for="ui-scale">UI Scale</label>
                    <input type="range" id="ui-scale" min="0.8" max="1.4" step="0.1" value="1" class="range-slider focus-ring">
                </div>
                <hr class="divider">
                <div class="setting-row">
                    <label for="toggle-sound">Sound (Beeps)</label>
                    <label class="switch"><input type="checkbox" id="toggle-sound" class="focus-ring" checked><span class="slider round"></span></label>
                </div>
                <div class="setting-row">
                    <label for="toggle-vibe">Haptics</label>
                    <label class="switch"><input type="checkbox" id="toggle-vibe" class="focus-ring" checked><span class="slider round"></span></label>
                </div>
                <div class="setting-row">
                    <label for="vibe-duration" style="font-size: 1rem; color: var(--text-secondary);">Bounce Multiplier</label>
                    <input type="range" id="vibe-duration" min="0.5" max="2" step="0.1" value="1" class="range-slider focus-ring">
                </div>
                <hr class="divider">
                <div style="display: flex; gap: 0.5rem;">
                    <button id="btn-export-txt" class="calc-btn action-btn focus-ring" style="flex: 1; font-size: 1rem; padding: 1rem;" aria-label="Export to Text File">
                        <span class="material-symbols-rounded" style="font-size: 1.5rem; margin-right: 4px;">description</span> TXT
                    </button>
                    <button id="btn-export-csv" class="calc-btn action-btn focus-ring" style="flex: 1; font-size: 1rem; padding: 1rem; background-color: #20bf6b;" aria-label="Export to CSV File">
                        <span class="material-symbols-rounded" style="font-size: 1.5rem; margin-right: 4px;">table</span> CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
